<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Somewhere — 404</title>
    <meta name="theme-color" content="#f5f5f5" />
    <link rel="icon" type="image/svg+xml" href="assets/img/app-icon.svg" />
    <style>
      /* self-contained: GitHub Pages serves this for any missing path,
         so it must not depend on external CSS resolving correctly. */
      :root { color-scheme: light dark; }
      body {
        margin: 0; min-height: 100vh;
        display: grid; place-items: center; text-align: center; padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
        background: #f5f5f5; color: #000;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #1a1a1a; color: #fff; }
      }
      .brand {
        display: flex; align-items: center; justify-content: center;
        gap: 16px; margin: 0 0 66px;
      }
      .logo { width: 76px; height: 76px; }
      .brand__name { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; }
      h1 { font-size: 56px; margin: 0 0 6px; font-weight: 800; letter-spacing: -0.02em; }
      p { opacity: 0.7; margin: 0 0 26px; }
      a.home {
        display: inline-flex; align-items: center; height: 50px; padding: 0 26px;
        border-radius: 999px; background: #0072f3; color: #fff;
        font-weight: 600; text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="brand">
        <svg class="logo" viewBox="0 0 1024 1024" fill="none" aria-hidden="true">
          <circle cx="307" cy="717" r="102" fill="#1DDB00"/>
          <g filter="url(#f404a)">
            <circle cx="355" cy="669" r="98" fill="black" fill-opacity="0.25"/>
          </g>
          <circle cx="425" cy="599" r="179" fill="#D47DFF"/>
          <g filter="url(#f404b)">
            <circle cx="519" cy="505" r="177" fill="black" fill-opacity="0.25"/>
          </g>
          <circle cx="594" cy="430" r="256" fill="#0072F3"/>
          <defs>
            <filter id="f404a" x="217" y="531" width="276" height="276" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
              <feFlood flood-opacity="0" result="BackgroundImageFix"/>
              <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
              <feGaussianBlur stdDeviation="20" result="effect1_foregroundBlur"/>
            </filter>
            <filter id="f404b" x="302" y="288" width="434" height="434" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
              <feFlood flood-opacity="0" result="BackgroundImageFix"/>
              <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
              <feGaussianBlur stdDeviation="20" result="effect1_foregroundBlur"/>
            </filter>
          </defs>
        </svg>
        <span class="brand__name">Somewhere</span>
      </div>
      <h1>404</h1>
      <p>Page not found · 페이지를 찾을 수 없습니다</p>
      <a class="home" href="index.html">Home · 홈으로</a>
    </div>
  </body>
</html>
