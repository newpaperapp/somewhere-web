<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="referrer" content="no-referrer" />
    <meta name="theme-color" content="#f5f5f5" />
    <title>Somewhere — 여행 초대</title>
    <link rel="icon" type="image/svg+xml" href="../assets/img/app-icon.svg" />
    <script src="../assets/js/i18n.js"></script>
    <style>
      @font-face {
        font-family: "Pretendard";
        font-display: swap;
        src: url("../assets/fonts/PretendardVariable.woff2") format("woff2");
      }

      :root {
        color-scheme: light dark;
        --background: #f5f5f5;
        --surface: #ffffff;
        --text: #111111;
        --muted: #6e6e6e;
        --outline: #e2e2e2;
        --primary: #0072f3;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #1a1a1a;
          --surface: #272727;
          --text: #ffffff;
          --muted: #b2b2b2;
          --outline: #3d3d3d;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--background);
        color: var(--text);
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(calc(100vw - 48px), 480px);
        padding: 36px 28px;
        border: 1px solid var(--outline);
        border-radius: 28px;
        background: var(--surface);
        text-align: center;
        box-shadow: 0 14px 40px rgb(0 0 0 / 10%);
      }

      img {
        width: 84px;
        height: 84px;
        margin: 0 auto 22px;
      }

      h1 {
        margin: 0;
        font-size: clamp(26px, 7vw, 34px);
        line-height: 1.25;
      }

      p {
        margin: 14px 0 0;
        color: var(--muted);
        line-height: 1.65;
        word-break: keep-all;
      }

      .stores {
        display: grid;
        gap: 12px;
        margin-top: 28px;
      }

      .store {
        display: block;
        padding: 14px 18px;
        border-radius: 16px;
        background: var(--primary);
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }

      .store--secondary {
        border: 1px solid var(--outline);
        background: transparent;
        color: var(--text);
      }

      .home {
        display: inline-block;
        margin-top: 24px;
        color: var(--muted);
        font-size: 14px;
      }

      html[lang="ko"] .lang-en,
      html[lang="en"] .lang-ko {
        display: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="../assets/img/app-icon.svg" alt="Somewhere" />
      <h1 class="lang-ko">여행 초대를 받았어요</h1>
      <h1 class="lang-en">You've been invited</h1>
      <p class="lang-ko">
        Somewhere 앱이 설치되어 있다면 아래 버튼을 눌러 여행 정보를 확인하고
        참가할 수 있습니다.
      </p>
      <p class="lang-en">
        If Somewhere is installed, use the button below to review and join the
        trip in the app.
      </p>
      <div class="stores">
        <a class="store" id="open-app" href="#" hidden>
          <span class="lang-ko">앱에서 열기</span>
          <span class="lang-en">Open in App</span>
        </a>
        <a class="store store--secondary" id="download-app" href="../download.html">
          <span class="lang-ko">앱 다운로드</span>
          <span class="lang-en">Download App</span>
        </a>
      </div>
      <a class="home" href="../index.html">
        <span class="lang-ko">Somewhere 홈으로</span>
        <span class="lang-en">Go to Somewhere Home</span>
      </a>
    </main>
    <script>
      (function () {
        // Apply detected language preference
        if (window.SomewhereI18N) {
          const lang = SomewhereI18N.detectLang();
          SomewhereI18N.applyLang(lang);
          
          // Set initial page title based on language
          document.title = lang === "ko" 
            ? "Somewhere — 여행 초대" 
            : "Somewhere — Trip Invitation";
            
          // Listen for dynamic language changes
          window.addEventListener("somewhere:langchange", function (e) {
            const currentLang = e.detail;
            document.title = currentLang === "ko" 
              ? "Somewhere — 여행 초대" 
              : "Somewhere — Trip Invitation";
          });
        }

        const openAppBtn = document.getElementById("open-app");
        const token = new URLSearchParams(window.location.search).get("token");

        // Only show "Open in App" button if a valid token is present
        if (!/^[A-Za-z0-9_-]{43}$/.test(token || "")) {
          return;
        }

        const isAndroid = /Android/i.test(navigator.userAgent);
        if (isAndroid) {
          const fallbackUrl = encodeURIComponent(window.location.href);
          openAppBtn.href =
            "intent://npsomewhere.com/join/?token=" +
            encodeURIComponent(token) +
            "#Intent;scheme=https;package=com.newpaper.somewhere;" +
            "S.browser_fallback_url=" +
            fallbackUrl +
            ";end";
        } else {
          // For iOS and other platforms, use the Universal Link URL
          openAppBtn.href = window.location.href;
        }
        
        openAppBtn.hidden = false;
      })();
    </script>
  </body>
</html>
